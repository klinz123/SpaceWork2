spring.application.name=spacework-backend

# puerto del servidor local
server.port=${SERVER_PORT:8080}

# conexion a la base de datos sql server local
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SpaceWork;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# config de hibernate para que no borre las tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# datos del correo (usando gmail por ahora para pruebas)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:pruebas.spacework@gmail.com}
spring.mail.password=${MAIL_PASSWORD:password_smtp_app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
server.error.include-message=never
server.error.include-stacktrace=never
